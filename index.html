<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #edf2f0;
    --surface: #f7faf9;
    --surface2: #dce8e4;
    --border: #c2d6cf;
    --text: #111e1a;
    --text2: #527068;
    --accent: #0e7c6b;
    --accent2: #1a5c8a;
    --accent3: #6b4fa5;
    --time-color: #0e7c6b;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.11);
    --radius: 16px;
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] {
    --bg: #0d1714;
    --surface: #132019;
    --surface2: #1c2e25;
    --border: #2a4238;
    --text: #e8f5f1;
    --text2: #7aaa98;
    --accent: #2ab99e;
    --accent2: #4d9fd6;
    --accent3: #a07ee8;
    --time-color: #2ab99e;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.5;
  }

  .layout {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
    display: grid;
    gap: 20px;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .topbar-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--text2);
    letter-spacing: 0.02em;
  }

  .topbar-controls { display: flex; gap: 10px; align-items: center; }

  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    transition: all var(--transition);
    box-shadow: var(--shadow);
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); transform: scale(1.05); }

  /* HERO / CLOCK CARD */
  .hero-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 40px 40px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .hero-card::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent) 0%, transparent 68%);
    opacity: 0.06;
    pointer-events: none;
  }

  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 600;
    color: var(--time-color);
    line-height: 1;
    letter-spacing: -0.02em;
    transition: color var(--transition);
  }

  .date-str {
    font-size: 0.85rem;
    color: var(--text2);
    margin-top: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .greeting {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--text);
    margin-top: 16px;
    font-style: italic;
  }

  /* MAIN GRID */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) { .main-grid { grid-template-columns: 1fr; } }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
  }

  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.25rem;
    color: var(--text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* FOCUS TIMER */
  .timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2.8rem, 7vw, 4.5rem);
    font-weight: 600;
    color: var(--text);
    text-align: center;
    line-height: 1;
    margin: 8px 0 24px;
    transition: color 0.3s;
  }
  .timer-display.running { color: var(--accent); }
  .timer-display.paused { color: var(--accent2); }

  .timer-settings {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    justify-content: center;
  }
  .timer-settings label { font-size: 0.8rem; color: var(--text2); font-weight: 500; }
  .timer-settings input[type="number"] {
    width: 64px;
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    text-align: center;
    outline: none;
    transition: border-color var(--transition);
  }
  .timer-settings input[type="number"]:focus { border-color: var(--accent); }
  .set-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
  }
  .set-btn:hover { background: var(--accent); color: #fff; }

  .timer-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all var(--transition);
    letter-spacing: 0.02em;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }

  .pomodoro-count {
    display: flex; gap: 6px; justify-content: center; margin-top: 16px;
  }
  .pom-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .pom-dot.done { background: var(--accent); }

  /* TASKS */
  .task-add {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .task-add input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color var(--transition);
  }
  .task-add input:focus { border-color: var(--accent3); }
  .task-add input::placeholder { color: var(--text2); }

  .task-controls {
    display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap;
  }
  .task-controls label { font-size: 0.75rem; color: var(--text2); font-weight: 500; }
  .sort-select {
    padding: 5px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    cursor: pointer;
  }

  .task-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
  .task-list::-webkit-scrollbar { width: 4px; }
  .task-list::-webkit-scrollbar-track { background: transparent; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    transition: all var(--transition);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .task-item:hover { border-color: var(--accent3); }
  .task-item.done { opacity: 0.55; }

  .task-cb {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 2px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    appearance: none;
    background: var(--surface);
    transition: all 0.2s;
    position: relative;
  }
  .task-cb:checked {
    background: var(--accent2);
    border-color: var(--accent2);
  }
  .task-cb:checked::after {
    content: '✓';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff; font-size: 11px; font-weight: 700;
  }

  .task-text {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.4;
    transition: text-decoration 0.2s;
    word-break: break-word;
    cursor: pointer;
  }
  .done .task-text { text-decoration: line-through; color: var(--text2); }

  .task-edit-input {
    flex: 1;
    padding: 2px 6px;
    border: 1.5px solid var(--accent3);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }

  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .task-btn {
    width: 28px; height: 28px; border-radius: 7px;
    border: none; cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  .task-btn-edit { background: var(--surface); color: var(--accent3); }
  .task-btn-edit:hover { background: var(--accent3); color: #fff; }
  .task-btn-del { background: var(--surface); color: var(--accent); }
  .task-btn-del:hover { background: var(--accent); color: #fff; }

  .task-empty {
    text-align: center;
    color: var(--text2);
    font-size: 0.85rem;
    padding: 24px;
    font-style: italic;
  }

  /* QUICK LINKS */
  .links-card { grid-column: 1 / -1; }
  .links-add {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .links-add input {
    flex: 1; min-width: 120px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color var(--transition);
  }
  .links-add input:focus { border-color: var(--accent3); }
  .links-add input::placeholder { color: var(--text2); }

  .links-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
  }

  .link-chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    color: var(--text);
    transition: all var(--transition);
    cursor: pointer;
    position: relative;
  }
  .link-chip:hover { background: var(--accent3); color: #fff; border-color: var(--accent3); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(74,111,165,0.3); }

  .link-favicon { width: 14px; height: 14px; border-radius: 3px; }
  .link-remove {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,0.15);
    border: none; color: inherit;
    font-size: 11px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .link-chip:hover .link-remove { opacity: 1; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    width: 90%; max-width: 380px;
    box-shadow: var(--shadow-lg);
    transform: scale(0.95);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 20px;
  }
  .modal label { font-size: 0.8rem; color: var(--text2); font-weight: 500; display: block; margin-bottom: 6px; }
  .modal input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 16px;
    transition: border-color var(--transition);
  }
  .modal input:focus { border-color: var(--accent3); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 2000;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .divider { width: 1px; height: 24px; background: var(--border); }
</style>
</head>
<body>

<div class="layout">
  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar-logo">✦ Dashboard</span>
    <div class="topbar-controls">
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
      <div class="divider"></div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">☀</button>
    </div>
  </div>

  <!-- HERO CLOCK CARD -->
  <div class="hero-card">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date-str" id="dateStr">–</div>
    <div class="greeting" id="greeting">Hello there.</div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">
    <!-- FOCUS TIMER -->
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--accent2)"></span> Focus Timer</div>
      <div class="timer-settings">
        <label>Minutes:</label>
        <input type="number" id="pomMinInput" value="25" min="1" max="180">
        <button class="set-btn" id="setTimerBtn">Set</button>
      </div>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-btns">
        <button class="btn btn-primary" id="startBtn">Start</button>
        <button class="btn btn-secondary" id="stopBtn">Pause</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
      </div>
      <div class="pomodoro-count" id="pomCount">
        <div class="pom-dot"></div>
        <div class="pom-dot"></div>
        <div class="pom-dot"></div>
        <div class="pom-dot"></div>
      </div>
    </div>

    <!-- TO-DO LIST -->
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--accent3)"></span> Tasks</div>
      <div class="task-add">
        <input type="text" id="taskInput" placeholder="Add a new task…" maxlength="100">
        <button class="btn btn-primary" id="addTaskBtn">Add</button>
      </div>
      <div class="task-controls">
        <label>Sort:</label>
        <select class="sort-select" id="sortSelect">
          <option value="added">Date added</option>
          <option value="alpha">A → Z</option>
          <option value="done">Done last</option>
        </select>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>

    <!-- QUICK LINKS -->
    <div class="card links-card">
      <div class="card-title"><span class="dot"></span> Quick Links</div>
      <div class="links-add">
        <input type="text" id="linkName" placeholder="Label (e.g. Google)">
        <input type="text" id="linkUrl" placeholder="URL (e.g. https://google.com)">
        <button class="btn btn-primary" id="addLinkBtn">Add Link</button>
      </div>
      <div class="links-grid" id="linksGrid"></div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <label>Your Name</label>
    <input type="text" id="nameInput" placeholder="e.g. Alex" maxlength="30">
    <div class="modal-btns">
      <button class="btn btn-secondary" id="closeSettingsBtn">Cancel</button>
      <button class="btn btn-primary" id="saveSettingsBtn">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  tasks: [],
  links: [],
  theme: 'light',
  name: '',
  pomMinutes: 25,
  pomDone: 0,
  timerState: 'idle', // idle | running | paused
  timerLeft: 0,
  timerInterval: null,
};

function load() {
  S.tasks = JSON.parse(localStorage.getItem('dash_tasks') || '[]');
  S.links = JSON.parse(localStorage.getItem('dash_links') || '[]');
  S.theme = localStorage.getItem('dash_theme') || 'light';
  S.name = localStorage.getItem('dash_name') || '';
  S.pomMinutes = parseInt(localStorage.getItem('dash_pomMin') || '25', 10);
  S.pomDone = parseInt(localStorage.getItem('dash_pomDone') || '0', 10);
}
function save(key) {
  const map = {
    tasks: ['dash_tasks', () => JSON.stringify(S.tasks)],
    links: ['dash_links', () => JSON.stringify(S.links)],
    theme: ['dash_theme', () => S.theme],
    name: ['dash_name', () => S.name],
    pomMin: ['dash_pomMin', () => String(S.pomMinutes)],
    pomDone: ['dash_pomDone', () => String(S.pomDone)],
  };
  if (map[key]) localStorage.setItem(map[key][0], map[key][1]());
}

// ─── CLOCK ───────────────────────────────────────────────────────────────────
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  document.getElementById('dateStr').textContent =
    `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  const hour = now.getHours();
  const name = S.name ? `, ${S.name}` : '';
  let greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = greet + name + '.';
}

// ─── THEME ───────────────────────────────────────────────────────────────────
function applyTheme() {
  document.documentElement.setAttribute('data-theme', S.theme);
  document.getElementById('themeBtn').textContent = S.theme === 'dark' ? '☾' : '☀';
}

document.getElementById('themeBtn').addEventListener('click', () => {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  save('theme'); applyTheme();
});

// ─── TASKS ───────────────────────────────────────────────────────────────────
function sortedTasks() {
  const mode = document.getElementById('sortSelect').value;
  const arr = [...S.tasks];
  if (mode === 'alpha') arr.sort((a,b) => a.text.localeCompare(b.text));
  else if (mode === 'done') arr.sort((a,b) => Number(a.done) - Number(b.done));
  return arr;
}

function renderTasks() {
  const list = document.getElementById('taskList');
  const tasks = sortedTasks();
  if (!tasks.length) {
    list.innerHTML = '<div class="task-empty">No tasks yet — you\'re all clear ✦</div>';
    return;
  }
  list.innerHTML = '';
  tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = 'task-item' + (task.done ? ' done' : '');
    item.dataset.id = task.id;

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'task-cb'; cb.checked = task.done;
    cb.addEventListener('change', () => toggleTask(task.id));

    const span = document.createElement('span');
    span.className = 'task-text';
    span.textContent = task.text;
    span.addEventListener('dblclick', () => startEdit(task.id, item, span));

    const actions = document.createElement('div');
    actions.className = 'task-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'task-btn task-btn-edit'; editBtn.title = 'Edit';
    editBtn.innerHTML = '✎';
    editBtn.addEventListener('click', () => startEdit(task.id, item, span));

    const delBtn = document.createElement('button');
    delBtn.className = 'task-btn task-btn-del'; delBtn.title = 'Delete';
    delBtn.innerHTML = '✕';
    delBtn.addEventListener('click', () => deleteTask(task.id));

    actions.append(editBtn, delBtn);
    item.append(cb, span, actions);
    list.append(item);
  });
}

function addTask() {
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) return;
  if (S.tasks.some(t => t.text.toLowerCase() === text.toLowerCase())) {
    showToast('Task already exists!'); return;
  }
  S.tasks.push({ id: Date.now(), text, done: false, createdAt: Date.now() });
  inp.value = '';
  save('tasks'); renderTasks();
}

function toggleTask(id) {
  const t = S.tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save('tasks'); renderTasks(); }
}

function deleteTask(id) {
  S.tasks = S.tasks.filter(t => t.id !== id);
  save('tasks'); renderTasks();
}

function startEdit(id, item, span) {
  if (item.querySelector('.task-edit-input')) return;
  const inp = document.createElement('input');
  inp.className = 'task-edit-input';
  inp.value = span.textContent;
  span.replaceWith(inp);
  inp.focus(); inp.select();

  function commitEdit() {
    const val = inp.value.trim();
    if (val && val !== S.tasks.find(t=>t.id===id)?.text) {
      if (S.tasks.some(t => t.id !== id && t.text.toLowerCase() === val.toLowerCase())) {
        showToast('Duplicate task!'); inp.focus(); return;
      }
      const t = S.tasks.find(t => t.id === id);
      if (t) t.text = val;
      save('tasks');
    }
    renderTasks();
  }
  inp.addEventListener('blur', commitEdit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') commitEdit();
    if (e.key === 'Escape') renderTasks();
  });
}

document.getElementById('addTaskBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.getElementById('sortSelect').addEventListener('change', renderTasks);

// ─── TIMER ───────────────────────────────────────────────────────────────────
function initTimer() {
  S.timerLeft = S.pomMinutes * 60;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(S.timerLeft / 60);
  const s = S.timerLeft % 60;
  document.getElementById('timerDisplay').textContent =
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateTimerClass() {
  const el = document.getElementById('timerDisplay');
  el.classList.toggle('running', S.timerState === 'running');
  el.classList.toggle('paused', S.timerState === 'paused');
}

function startTimer() {
  if (S.timerState === 'running') return;
  if (S.timerState === 'idle') S.timerLeft = S.pomMinutes * 60;
  S.timerState = 'running';
  updateTimerClass();
  S.timerInterval = setInterval(() => {
    S.timerLeft--;
    updateTimerDisplay();
    if (S.timerLeft <= 0) {
      clearInterval(S.timerInterval);
      S.timerState = 'idle';
      updateTimerClass();
      S.pomDone = (S.pomDone + 1) % 5;
      save('pomDone'); renderPomDots();
      showToast('🎉 Focus session complete!');
    }
  }, 1000);
}

function stopTimer() {
  if (S.timerState !== 'running') return;
  clearInterval(S.timerInterval);
  S.timerState = 'paused';
  updateTimerClass();
}

function resetTimer() {
  clearInterval(S.timerInterval);
  S.timerState = 'idle';
  S.timerLeft = S.pomMinutes * 60;
  updateTimerDisplay(); updateTimerClass();
}

function renderPomDots() {
  const dots = document.querySelectorAll('.pom-dot');
  dots.forEach((d,i) => d.classList.toggle('done', i < (S.pomDone % 4 || (S.pomDone > 0 && S.pomDone % 4 === 0 ? 4 : 0))));
}

document.getElementById('startBtn').addEventListener('click', startTimer);
document.getElementById('stopBtn').addEventListener('click', stopTimer);
document.getElementById('resetBtn').addEventListener('click', resetTimer);
document.getElementById('setTimerBtn').addEventListener('click', () => {
  const v = parseInt(document.getElementById('pomMinInput').value, 10);
  if (v > 0 && v <= 180) {
    S.pomMinutes = v; save('pomMin');
    resetTimer();
    showToast(`Timer set to ${v} minutes`);
  }
});

// ─── LINKS ───────────────────────────────────────────────────────────────────
function getFavicon(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=32`;
  } catch { return null; }
}

function normalizeUrl(url) {
  if (!url.startsWith('http://') && !url.startsWith('https://')) return 'https://' + url;
  return url;
}

function renderLinks() {
  const grid = document.getElementById('linksGrid');
  grid.innerHTML = '';
  S.links.forEach((link, i) => {
    const chip = document.createElement('div');
    chip.className = 'link-chip';

    const fav = getFavicon(link.url);
    if (fav) {
      const img = document.createElement('img');
      img.className = 'link-favicon'; img.src = fav;
      img.onerror = () => img.remove();
      chip.append(img);
    }

    const label = document.createElement('span');
    label.textContent = link.name;
    chip.append(label);

    const rm = document.createElement('button');
    rm.className = 'link-remove'; rm.textContent = '×';
    rm.addEventListener('click', e => { e.stopPropagation(); removeLink(i); });
    chip.append(rm);

    chip.addEventListener('click', () => window.open(link.url, '_blank'));
    grid.append(chip);
  });
}

function addLink() {
  const name = document.getElementById('linkName').value.trim();
  const rawUrl = document.getElementById('linkUrl').value.trim();
  if (!name || !rawUrl) { showToast('Enter both a label and URL'); return; }
  const url = normalizeUrl(rawUrl);
  S.links.push({ name, url });
  document.getElementById('linkName').value = '';
  document.getElementById('linkUrl').value = '';
  save('links'); renderLinks();
}

function removeLink(i) {
  S.links.splice(i, 1);
  save('links'); renderLinks();
}

document.getElementById('addLinkBtn').addEventListener('click', addLink);
document.getElementById('linkUrl').addEventListener('keydown', e => { if (e.key === 'Enter') addLink(); });

// ─── SETTINGS MODAL ──────────────────────────────────────────────────────────
document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('nameInput').value = S.name;
  document.getElementById('settingsModal').classList.add('open');
});
document.getElementById('closeSettingsBtn').addEventListener('click', () => {
  document.getElementById('settingsModal').classList.remove('open');
});
document.getElementById('settingsModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
  S.name = document.getElementById('nameInput').value.trim();
  save('name');
  document.getElementById('settingsModal').classList.remove('open');
  updateClock();
  showToast('Settings saved ✦');
});

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
applyTheme();
document.getElementById('pomMinInput').value = S.pomMinutes;
initTimer();
renderPomDots();
renderTasks();
renderLinks();
updateClock();
setInterval(updateClock, 1000);

// Default links if empty
if (!S.links.length) {
  S.links = [
    { name: 'Google', url: 'https://google.com' },
    { name: 'Gmail', url: 'https://gmail.com' },
    { name: 'Calendar', url: 'https://calendar.google.com' },
  ];
  save('links'); renderLinks();
}
</script>
